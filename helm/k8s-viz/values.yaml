# Backend
backend:
  image:
    repository: ghcr.io/tamhid92/k8s-viz-backend
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1
  port: 5000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    FLASK_DEBUG: "false"

# Frontend
frontend:
  image:
    repository: ghcr.io/tamhid92/k8s-viz-frontend
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    type: NodePort
    port: 80
    nodePort: 0

# ServiceAccount and RBAC
serviceAccount:
  create: true
  name: ""              # auto-generated from chart name if empty

# Pod-level settings
podAnnotations: {}
podSecurityContext: {}
securityContext: {}

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}
