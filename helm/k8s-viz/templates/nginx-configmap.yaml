apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-viz.fullname" . }}-nginx-conf
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-viz.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # React SPA — all non-matched paths return index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # REST API proxy
        location /api/ {
            proxy_pass http://{{ include "k8s-viz.backendServiceName" . }}:{{ .Values.backend.port }}/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # SocketIO WebSocket proxy
        location /socket.io/ {
            proxy_pass http://{{ include "k8s-viz.backendServiceName" . }}:{{ .Values.backend.port }}/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health + readiness probes proxied to backend
        location /healthz {
            proxy_pass http://{{ include "k8s-viz.backendServiceName" . }}:{{ .Values.backend.port }}/healthz;
            proxy_http_version 1.1;
        }

        location /readyz {
            proxy_pass http://{{ include "k8s-viz.backendServiceName" . }}:{{ .Values.backend.port }}/readyz;
            proxy_http_version 1.1;
        }

        # Log streaming — SSE requires buffering disabled
        location /api/v1/logs/ {
            proxy_pass http://{{ include "k8s-viz.backendServiceName" . }}:{{ .Values.backend.port }}/api/v1/logs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }
    }
