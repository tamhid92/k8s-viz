apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-viz.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-viz.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "k8s-viz.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.frontend.service.type "NodePort") (ne (.Values.frontend.service.nodePort | int) 0) }}
      nodePort: {{ .Values.frontend.service.nodePort }}
      {{- end }}
